<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fahrzeug Auswahl</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        img {
            width: auto;
            height: 150px;
            object-fit: contain;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background-color: #007aff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #005ecb;
        }

        /* Kleiner Footer-Text */
        .footer {
            font-size: 10px;
            color: #666;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        /* Bild unter Footer */
        .footer-image img {
            width: 100px;
            height: auto;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<h1>Was für ein Fahrzeug hast du vor dir?</h1>

<div class="container">

    <div class="card">
        <img src="E_Trottinett.png" alt="Elektro-Trottinett">
        <br>
        <button onclick="location.href='regelnetrottinett.html'">
            Elektro-Trottinett
        </button>
    </div>

    <div class="card">
        <img src="fahrrad.png" alt="Fahrrad">
        <br>
        <button onclick="location.href='regelnfahrrad.html'">
            Fahrrad
        </button>
    </div>

    <div class="card">
        <img src="E_Bike_langsam.png" alt="E-Bike (25km/h)">
        <br>
        <button onclick="location.href='regelnebikelangsam.html'">
            E-Bike (25km/h)
        </button>
    </div>

    <div class="card">
        <img src="E_Bike_schnell.png" alt="E-Bike (45km/h)">
        <br>
        <button onclick="location.href='ebike45.html'">
            E-Bike (45km/h)
        </button>
    </div>

    <div class="card">
        <img src="Elektro_Lastenfahrrad_leicht.png" alt="Elektro-Lastenfahrrad (leicht)">
        <br>
        <button onclick="location.href='regelnelektrolastenfahrradleicht.html'">
            Elektro-Lastenfahrrad (leicht)
        </button>
    </div>

    <div class="card">
        <img src="Elektro_Lastenfahrrad_schwer.png" alt="Elektro-Lastenfahrrad (schwer)">
        <br>
        <button onclick="location.href='regelnschwer.html'">
            Elektro-Lastenfahrrad (schwer)
        </button>
    </div>

    <div class="card">
        <img src="Elektro_Roller.png" alt="Elektro-Roller">
        <br>
        <button onclick="location.href='regelnelektroroller.html'">
            Elektro-Roller
        </button>
    </div>

    <div class="card">
        <img src="Elektro_Scooter.png" alt="Elektro-Scooter">
        <br>
        <button onclick="location.href='regelnelektroscooter.html'">
            Elektro-Scooter
        </button>
    </div>

    <div class="card">
        <img src="mofa.png" alt="Motorfahrrad (30km/h)">
        <br>
        <button onclick="location.href='motorfahrrad30.html'">
            Motorfahrrad (30km/h)
        </button>
    </div>

    <div class="card">
        <img src="Elektro_Stehroller.png" alt="Elektro-Stehroller">
        <br>
        <button onclick="location.href='regelnroller.html'">
            Elektro Stehroller
        </button>
    </div>

    <div class="card">
        <img src="Elektro_Rollstuhl.png" alt="Motorisierte Rollstühle">
        <br>
        <button onclick="location.href='regelnrollstuhl.html'">
            Motorisierte Rollstühle
        </button>
    </div>

</div>

<!-- Footer -->
<div class="footer">
    Version 1.0 / 10.05.2026
</div>

<!-- Bild unter Footer -->
<div class="footer-image">
    <img src="WM Logo.jpg" alt="Logo">
</div>

</body>
</html>
