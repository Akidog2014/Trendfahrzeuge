<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auswahl Regeln</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f2f2f2;
        }
        h1 {
            margin-top: 20px;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        /* Buttons nebeneinander innerhalb einer Karte */
        .card-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            background-color: #007aff;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #005fcc;
        }
    </style>
</head>
<body>

<h1>Motorfahrrad 30km/h</h1>
<h1>Was möchtest du sehen?</h1>

<div class="container">

    <!-- Erste Karte mit zwei Buttons nebeneinander -->
    <div class="card">
        <div class="card-buttons">
            <button onclick="location.href='vorschriftenmofa.html'">Vorschriften</button>
        </div>
    </div>

    <!-- Zweite Karte mit einem Button -->
    <div class="card">
        <button onclick="location.href='signalmofa30.html'">Verkehrsregeln</button>
    </div>

</div>

</body>
</html>
